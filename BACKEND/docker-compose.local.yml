volumes:
  foodguard_local_postgres_data: {}
  foodguard_local_postgres_data_backups: {}
  ollama_data: {}

services:
  django:
    build:
      context: .
      dockerfile: ./compose/local/django/Dockerfile
    image: foodguard_local_django
    container_name: foodguard_local_django
    user: "dev-user"
    depends_on:
      - postgres
    volumes:
      - .:/app:z
    env_file:
      - ./.envs/.local/.postgres
    ports:
      - "8000:8000"
    command: /start
    environment:
      - TZ=America/Fortaleza

  postgres:
    image: docker.io/postgres:16
    container_name: foodguard_local_postgres
    volumes:
      - foodguard_local_postgres_data:/var/lib/postgresql/data
      - foodguard_local_postgres_data_backups:/backups
    env_file:
      - ./.envs/.local/.postgres
    ports:
      - "5432:5432"
    environment:
      - TZ=America/Fortaleza

  ollama:
    image: ollama/ollama:latest
    container_name: foodguard_local_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
      - ./compose/local/ollama/entrypoint.sh:/entrypoint.sh
    env_file:
      - ./.envs/.local/.ollama
    entrypoint: ["/bin/bash", "/entrypoint.sh"]